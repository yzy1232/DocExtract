services:
  # ─── 基础设施 ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: docextract_mysql
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --host_cache_size=0
      - --mysqlx=0
      - --pid-file=/tmp/mysqld.pid
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-docextract}
      MYSQL_USER: ${DB_USER:-docuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-docpassword}
      MYSQL_INITDB_SKIP_TZINFO: 1
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docextract_net

  redis:
    image: redis:7-alpine
    container_name: docextract_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    # sysctls:
    #   - vm.overcommit_memory=1
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docextract_net

  minio:
    image: minio/minio:latest
    container_name: docextract_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docextract_net

  # ─── 后端服务 ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docextract_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      STORAGE_ENDPOINT: minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - docextract_net

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docextract_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      STORAGE_ENDPOINT: minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app worker -E
      --loglevel=info
      --concurrency=4
      -Q document,extraction,default
    networks:
      - docextract_net

  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docextract_flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
    command: >
      sh -c "sleep 8 && celery -A app.tasks.celery_app flower
      --port=5555
      --persistent=true
      --db=/tmp/flower
      --inspect-timeout=10000"
    networks:
      - docextract_net

  # ─── 前端 ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docextract_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - docextract_net

  # ─── 反向代理 ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: docextract_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
    networks:
      - docextract_net

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  docextract_net:
    driver: bridge
